# =============================================================================
# AI Drug Screening Platform — Docker Compose
# =============================================================================
# 启动:  docker compose up -d
# 停止:  docker compose down
# 重建:  docker compose up -d --build
#
# 服务:
#   MySQL 8.0      :3306  — 业务数据库
#   Redis 7        :6379  — 缓存 / 消息队列
#   Milvus 2.4     :19530 — 分子指纹向量检索
#   MinIO          :9000  — 对象存储 (PDBQT/Docking输出/报告)
#   Backend        :8000  — FastAPI
#   Frontend       :3000  — React + Nginx
# =============================================================================

services:
  # ─────────────────────────────────────
  # MySQL 8.0
  # ─────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: drug-screening-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-drug_screening}
    ports:
      - "13306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-root}"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - drug-screening-net

  # ─────────────────────────────────────
  # Redis 7
  # ─────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: drug-screening-redis
    restart: unless-stopped
    ports:
      - "16379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - drug-screening-net

  # ─────────────────────────────────────
  # Milvus 2.4 Standalone (嵌入式 etcd + 本地存储)
  # ─────────────────────────────────────
  milvus:
    image: milvusdb/milvus:v2.4.0
    container_name: drug-screening-milvus
    restart: unless-stopped
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_USE_EMBED: "true"
      COMMON_STORAGETYPE: "local"
    ports:
      - "19530:19530"
      - "9091:9091"
    volumes:
      - milvus_data:/var/lib/milvus
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 10s
      timeout: 5s
      retries: 15
    networks:
      - drug-screening-net

  # ─────────────────────────────────────
  # MinIO 对象存储
  # ─────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: drug-screening-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - drug-screening-net

  # ─────────────────────────────────────
  # Backend — FastAPI
  # ─────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: drug-screening-backend
    restart: unless-stopped
    env_file: .env
    environment:
      # Application
      APP_NAME: "AI Drug Screening Platform"
      APP_VERSION: "1.0.0"
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      DEBUG: "true"
      # MySQL (Docker 内部服务名)
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_USER: root
      MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-drug_screening}
      # Redis
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      # Milvus
      MILVUS_HOST: milvus
      MILVUS_PORT: "19530"
      # MinIO
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      # CORS
      CORS_ORIGINS: '["http://localhost:3000","http://127.0.0.1:3000"]'
    ports:
      - "18000:8000"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      milvus:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - drug-screening-net

  # ─────────────────────────────────────
  # Scheduler — 任务调度器
  # ─────────────────────────────────────
  scheduler:
    image: ai-drug-screening-platform-backend:latest
    container_name: drug-screening-scheduler
    restart: unless-stopped
    command: python -m app.workers.scheduler
    healthcheck:
      test: ["CMD", "true"]
      interval: 30s
    env_file: .env
    environment:
      APP_NAME: "AI Drug Screening Platform"
      APP_VERSION: "1.0.0"
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      DEBUG: "true"
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_USER: root
      MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-drug_screening}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      MILVUS_HOST: milvus
      MILVUS_PORT: "19530"
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      CORS_ORIGINS: '["http://localhost:3000"]'
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - drug-screening-net

  # ─────────────────────────────────────
  # Docking Worker — AutoDock Vina 计算
  # ─────────────────────────────────────
  docking-worker:
    image: ai-drug-screening-platform-backend:latest
    container_name: drug-screening-docking-worker
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "true"]
      interval: 30s
    command: python -m app.workers.docking_worker
    env_file: .env
    environment:
      APP_NAME: "AI Drug Screening Platform"
      APP_VERSION: "1.0.0"
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      DEBUG: "true"
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_USER: root
      MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-drug_screening}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      MILVUS_HOST: milvus
      MILVUS_PORT: "19530"
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      CORS_ORIGINS: '["http://localhost:3000"]'
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - drug-screening-net

  # ─────────────────────────────────────
  # Frontend — React + Nginx
  # ─────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: drug-screening-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - drug-screening-net

volumes:
  mysql_data:
  redis_data:
  milvus_data:
  minio_data:

networks:
  drug-screening-net:
    driver: bridge
